<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <script>(function(){try{var t=localStorage.getItem('fw-theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}}());</script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FlexiWork Admin — Jobs</title>
  <style th:utext="${adminCss}"></style>
</head>
<body>
<div class="app">
  <div th:replace="~{admin/fragments :: sidebar('jobs')}"></div>
  <main class="main"><div class="content">

    <div th:replace="~{admin/fragments :: pageHeader('Jobs', 'All job posts on the platform')}"></div>

    <div class="empty" th:if="${jobs.isEmpty()}">No jobs posted yet.</div>

    <div class="table-wrap" th:unless="${jobs.isEmpty()}">
      <table>
        <thead>
        <tr><th>Title</th><th>Company</th><th>District</th><th>Date</th><th>Wage</th><th>Slots</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody>
        <tr th:each="j : ${jobs}">
          <td style="font-weight:600;" th:text="${j.title}">Waiter</td>
          <td th:text="${j.company.companyName}">ABC Hotels</td>
          <td th:text="${j.district}">COLOMBO</td>
          <td th:text="${j.jobDate}">2026-07-01</td>
          <td th:text="${'LKR ' + j.dailyWage}">3500</td>
          <td th:text="${j.workersAccepted} + ' / ' + ${j.workersNeeded}">0 / 5</td>
          <td><span class="badge" th:classappend="${#strings.toLowerCase(j.status)}" th:text="${j.status}">OPEN</span></td>
          <td>
            <div class="actions">
              <form class="inline" method="post" th:action="@{'/admin/jobs/' + ${j.id}}"
                    th:if="${j.status.name() != 'CANCELLED' and j.status.name() != 'COMPLETED'}">
                <input type="hidden" name="_method" value="delete"/>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn btn-danger" type="submit">Cancel</button>
              </form>
              <form class="inline" method="post" th:action="@{'/admin/jobs/' + ${j.id} + '/delete'}"
                    onsubmit="return confirm('Delete this job? This permanently removes it and all its applications, attendance and payment records.');">
                <input type="hidden" name="_method" value="delete"/>
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button class="btn-icon-danger" type="submit" title="Delete job" aria-label="Delete job">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    <line x1="10" y1="11" x2="10" y2="17"/>
                    <line x1="14" y1="11" x2="14" y2="17"/>
                  </svg>
                </button>
              </form>
            </div>
          </td>
        </tr>
        </tbody>
      </table>
    </div>

  </div></main>
</div>
</body>
</html>
